<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNUST Virtual Classroom</title>

    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-card">

        <div class="header">
            <img src="images/knustlogo.png" alt="KNUST Logo">
            <h2>KNUST ISO BUILDER</h2>
        </div>

        <form id="loginForm">

            <input
                type="text"
                id="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Log in
            </button>

        </form>

        <a href="#" class="forgot-password">
            Lost password?
        </a>

        <hr>

        
    </div>

    <script src="login.js"></script>

</body>
</html>
